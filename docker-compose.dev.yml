version: "3.9"

services:
app:
build: ./app
volumes:
- ./app:/app
environment:
- FLASK_ENV=development
command: python app.py

nginx:
volumes:
- ./nginx/nginx.conf:/etc/nginx/nginx.conf

prometheus:
volumes:
- ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

grafana:
environment:
- GF_SECURITY_ADMIN_PASSWORD=admin

